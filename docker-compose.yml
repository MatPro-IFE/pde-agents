# PDE Agents: Multi-Agent Ecosystem for PDE Simulation
# Hardware: 2x NVIDIA RTX PRO 6000 Black (~98GB VRAM each)

networks:
  pde-net:
    driver: bridge

volumes:
  postgres_data:
  redis_data:
  minio_data:
  ollama_data:
  simulation_results:
  mesh_store:
  neo4j_data:
  neo4j_logs:

services:

  # ─── LLM Infrastructure ────────────────────────────────────────────────────

  ollama:
    image: ollama/ollama:latest
    container_name: pde-ollama
    restart: unless-stopped
    networks: [pde-net]
    ports:
      - "11434:11434"
    volumes:
      - ollama_data:/root/.ollama
      - ./scripts/ollama-init.sh:/ollama-init.sh
    environment:
      - OLLAMA_NUM_PARALLEL=4
      - OLLAMA_MAX_LOADED_MODELS=3
      - OLLAMA_FLASH_ATTENTION=1
    deploy:
      resources:
        reservations:
          devices:
            - driver: nvidia
              count: all
              capabilities: [gpu]
    healthcheck:
      test: ["CMD", "ollama", "list"]
      interval: 30s
      timeout: 15s
      retries: 5
      start_period: 30s

  # ─── Database ──────────────────────────────────────────────────────────────

  postgres:
    image: postgres:16-alpine
    container_name: pde-postgres
    restart: unless-stopped
    networks: [pde-net]
    ports:
      - "5432:5432"
    volumes:
      - postgres_data:/var/lib/postgresql/data
      - ./database/init.sql:/docker-entrypoint-initdb.d/init.sql
    environment:
      POSTGRES_DB: ${POSTGRES_DB:-pde_simulations}
      POSTGRES_USER: ${POSTGRES_USER:-pde_user}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD:-pde_secret}
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U ${POSTGRES_USER:-pde_user}"]
      interval: 10s
      timeout: 5s
      retries: 5

  # ─── Message Broker ────────────────────────────────────────────────────────

  redis:
    image: redis:7-alpine
    container_name: pde-redis
    restart: unless-stopped
    networks: [pde-net]
    ports:
      - "6379:6379"
    volumes:
      - redis_data:/data
    command: redis-server --appendonly yes --maxmemory 4gb --maxmemory-policy allkeys-lru
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 10s
      timeout: 5s
      retries: 5

  # ─── Object Storage (VTK/HDF5/mesh files) ──────────────────────────────────

  minio:
    image: minio/minio:latest
    container_name: pde-minio
    restart: unless-stopped
    networks: [pde-net]
    ports:
      - "9000:9000"
      # MinIO console mapped to host port 9002 (9001 is repurposed for NeoDash).
      # Access via SSH tunnel: ssh -L 19001:localhost:9002 -N <server>
      - "9002:9001"
    volumes:
      - minio_data:/data
    environment:
      MINIO_ROOT_USER: ${MINIO_ROOT_USER:-minio_admin}
      MINIO_ROOT_PASSWORD: ${MINIO_ROOT_PASSWORD:-minio_secret123}
    command: server /data --console-address ":9001"
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:9000/minio/health/live"]
      interval: 30s
      timeout: 10s
      retries: 3

  # ─── Knowledge Graph (Neo4j) ───────────────────────────────────────────────

  neo4j:
    image: neo4j:5-community
    container_name: pde-neo4j
    restart: unless-stopped
    networks: [pde-net]
    ports:
      - "7474:7474"   # Browser UI  →  http://localhost:7474
      - "7687:7687"   # Bolt protocol (driver connection)
    volumes:
      - neo4j_data:/data
      - neo4j_logs:/logs
    environment:
      NEO4J_AUTH: ${NEO4J_USER:-neo4j}/${NEO4J_PASSWORD:-pde_graph_secret}
      NEO4J_PLUGINS: '["apoc"]'
      NEO4J_dbms_security_procedures_unrestricted: apoc.*
      NEO4J_server_memory_heap_initial__size: 512m
      NEO4J_server_memory_heap_max__size: 2g
    healthcheck:
      test: ["CMD", "neo4j", "status"]
      interval: 20s
      timeout: 10s
      retries: 10
      start_period: 40s

  # ─── FEniCSx Simulation Runner ─────────────────────────────────────────────

  fenics-runner:
    build:
      context: .
      dockerfile: docker/Dockerfile.fenics
    container_name: pde-fenics
    restart: unless-stopped
    networks: [pde-net]
    ports:
      - "8080:8080"  # Simulation job API
      - "8888:8888"  # JupyterLab (when enabled)
    volumes:
      - ./simulations:/workspace/simulations
      - simulation_results:/workspace/results
      - mesh_store:/workspace/meshes
    environment:
      - POSTGRES_HOST=postgres
      - POSTGRES_DB=${POSTGRES_DB:-pde_simulations}
      - POSTGRES_USER=${POSTGRES_USER:-pde_user}
      - POSTGRES_PASSWORD=${POSTGRES_PASSWORD:-pde_secret}
      - REDIS_URL=redis://redis:6379/0
      - MINIO_ENDPOINT=minio:9000
      - MINIO_ACCESS_KEY=${MINIO_ROOT_USER:-minio_admin}
      - MINIO_SECRET_KEY=${MINIO_ROOT_PASSWORD:-minio_secret123}
    deploy:
      resources:
        reservations:
          devices:
            - driver: nvidia
              count: all
              capabilities: [gpu]
    depends_on:
      postgres:
        condition: service_healthy
      redis:
        condition: service_healthy
    command: >
      bash -c "uvicorn fenics_runner_api:app --app-dir /workspace --host 0.0.0.0 --port 8080 --workers 2"

  # ─── Agents Service ────────────────────────────────────────────────────────

  agents:
    build:
      context: .
      dockerfile: docker/Dockerfile.agents
    container_name: pde-agents
    restart: unless-stopped
    networks: [pde-net]
    ports:
      - "8000:8000"  # FastAPI REST interface
    volumes:
      - ./agents:/app/agents
      - ./tools:/app/tools
      - ./orchestrator:/app/orchestrator
      - ./database:/app/database
      - ./knowledge_graph:/app/knowledge_graph
      - simulation_results:/workspace/results
      - mesh_store:/workspace/meshes
    environment:
      - OLLAMA_BASE_URL=http://ollama:11434
      - POSTGRES_HOST=postgres
      - POSTGRES_DB=${POSTGRES_DB:-pde_simulations}
      - POSTGRES_USER=${POSTGRES_USER:-pde_user}
      - POSTGRES_PASSWORD=${POSTGRES_PASSWORD:-pde_secret}
      - REDIS_URL=redis://redis:6379/0
      - MINIO_ENDPOINT=minio:9000
      - MINIO_ACCESS_KEY=${MINIO_ROOT_USER:-minio_admin}
      - MINIO_SECRET_KEY=${MINIO_ROOT_PASSWORD:-minio_secret123}
      - SIMULATION_AGENT_MODEL=${SIM_MODEL:-qwen2.5-coder:32b}
      - ANALYTICS_AGENT_MODEL=${ANALYTICS_MODEL:-llama3.3:70b}
      - DATABASE_AGENT_MODEL=${DB_MODEL:-qwen2.5-coder:14b}
      - FENICS_RUNNER_URL=http://fenics-runner:8080
      - RESULTS_PATH=/workspace/results
      - MESH_PATH=/workspace/meshes
      - NEO4J_URI=bolt://neo4j:7687
      - NEO4J_USER=${NEO4J_USER:-neo4j}
      - NEO4J_PASSWORD=${NEO4J_PASSWORD:-pde_graph_secret}
      - ROOT_PATH=/agents
    depends_on:
      ollama:
        condition: service_healthy
      postgres:
        condition: service_healthy
      redis:
        condition: service_healthy
      neo4j:
        condition: service_healthy
    command: uvicorn orchestrator.api:app --host 0.0.0.0 --port 8000 --reload --root-path /agents

  # ─── Visualization Dashboard ───────────────────────────────────────────────

  dashboard:
    build:
      context: .
      dockerfile: docker/Dockerfile.dashboard
    container_name: pde-dashboard
    restart: unless-stopped
    networks: [pde-net]
    # No external port — accessed only through nginx
    volumes:
      - ./visualization:/app/visualization
      - ./knowledge_graph:/app/knowledge_graph   # needed for KG tab
      - ./database:/app/database
      - simulation_results:/workspace/results
    environment:
      - POSTGRES_HOST=postgres
      - POSTGRES_DB=${POSTGRES_DB:-pde_simulations}
      - POSTGRES_USER=${POSTGRES_USER:-pde_user}
      - POSTGRES_PASSWORD=${POSTGRES_PASSWORD:-pde_secret}
      - REDIS_URL=redis://redis:6379/0
      - MINIO_ENDPOINT=minio:9000
      - MINIO_ACCESS_KEY=${MINIO_ROOT_USER:-minio_admin}
      - MINIO_SECRET_KEY=${MINIO_ROOT_PASSWORD:-minio_secret123}
      - RESULTS_PATH=/workspace/results
      - NEO4J_URI=bolt://neo4j:7687
      - NEO4J_USER=${NEO4J_USER:-neo4j}
      - NEO4J_PASSWORD=${NEO4J_PASSWORD:-pde_graph_secret}
      - OLLAMA_BASE_URL=http://ollama:11434
    depends_on:
      postgres:
        condition: service_healthy
      neo4j:
        condition: service_healthy
    command: >
      sh -c "pip install neo4j --quiet --exists-action i &&
             python /app/visualization/dashboard.py"

  # ─── Nginx Reverse Proxy (single entry point for all services) ────────────

  nginx:
    image: nginx:alpine
    container_name: pde-nginx
    restart: unless-stopped
    networks: [pde-net]
    ports:
      - "8050:80"   # Main entry point — all services accessible through here
      - "80:80"     # Also on port 80 if available on the network
    volumes:
      - ./nginx/nginx.conf:/etc/nginx/nginx.conf:ro
    depends_on:
      - dashboard
      - mlflow
      - minio
      - fenics-runner
      - neo4j

  # ─── MLflow Experiment Tracking ────────────────────────────────────────────

  mlflow:
    image: ghcr.io/mlflow/mlflow:latest
    container_name: pde-mlflow
    restart: unless-stopped
    networks: [pde-net]
    ports:
      - "5000:5000"
    volumes:
      - ./mlflow_data:/mlflow
    environment:
      - MLFLOW_BACKEND_STORE_URI=postgresql://${POSTGRES_USER:-pde_user}:${POSTGRES_PASSWORD:-pde_secret}@postgres:5432/${POSTGRES_DB:-pde_simulations}
      - MLFLOW_DEFAULT_ARTIFACT_ROOT=/mlflow/artifacts
    depends_on:
      postgres:
        condition: service_healthy
    command: >
      mlflow server
        --backend-store-uri postgresql://${POSTGRES_USER:-pde_user}:${POSTGRES_PASSWORD:-pde_secret}@postgres:5432/${POSTGRES_DB:-pde_simulations}
        --default-artifact-root /mlflow/artifacts
        --host 0.0.0.0 --port 5000
        --static-prefix /mlflow

  # ─── NeoDash — open-source KG dashboard (Neo4j Labs, Apache 2.0) ───────────
  # Provides a no-code graph visualization UI for Neo4j.
  # Reuses port 9001 (previously MinIO console) — no new firewall rule needed.
  # Access at http://<host>:9001  (or via the dashboard nav link).
  # Credentials are read from .env: NEO4J_USER / NEO4J_PASSWORD.
  neodash:
    image: neo4jlabs/neodash:latest
    container_name: pde-neodash
    restart: unless-stopped
    networks: [pde-net]
    ports:
      - "9001:5005"
    environment:
      - ssoEnabled=false
      - standalone=true
      - standaloneProtocol=bolt
      - standaloneHost=${NEO4J_HOST:-neo4j}
      - standalonePort=7687
      - standaloneDatabase=neo4j
      - standaloneDashboardName=PDE Agents KG
      - standaloneDashboardDatabase=neo4j
      - standaloneUsername=${NEO4J_USER:-neo4j}
      - standalonePassword=${NEO4J_PASSWORD:-pde_graph_secret}
    depends_on:
      - neo4j
