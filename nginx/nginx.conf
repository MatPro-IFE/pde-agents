events {
    worker_connections 1024;
}

http {
    # Docker's internal DNS — re-resolves hostnames at each request when
    # hostname is in a variable (prevents stale IPs after container restarts)
    resolver 127.0.0.11 valid=10s ipv6=off;

    proxy_buffer_size       128k;
    proxy_buffers           4 256k;
    proxy_busy_buffers_size 256k;

    server {
        listen 80;
        server_name _;

        # ── Dashboard (main app at /) ─────────────────────────────────────────
        # No path in proxy_pass → full URI forwarded as-is: / → dashboard:8050/
        location / {
            set $dash "dashboard:8050";
            proxy_pass         http://$dash;
            proxy_http_version 1.1;
            proxy_set_header   Upgrade    $http_upgrade;
            proxy_set_header   Connection "upgrade";
            proxy_set_header   Host       $host;
            proxy_set_header   X-Real-IP  $remote_addr;
            proxy_read_timeout 86400;
        }

        # MinIO is accessed directly on port 9001 (link built dynamically in the
        # dashboard). The /api/v1/ location below is kept in case any internal
        # service makes MinIO API calls through nginx.
        location /api/v1/ {
            set $mio "minio:9001";
            proxy_pass         http://$mio;
            proxy_set_header   Host $host;
        }

        # ── Agents API (FastAPI Swagger at /agents/docs) ──────────────────────
        # Static proxy_pass for reliable path stripping:
        # /agents/docs → agents:8000/docs
        location /agents/ {
            proxy_pass         http://agents:8000/;
            proxy_http_version 1.1;
            proxy_set_header   Upgrade    $http_upgrade;
            proxy_set_header   Connection "upgrade";
            proxy_set_header   Host       $host;
            proxy_read_timeout 86400;
        }

        # ── Neo4j Browser ─────────────────────────────────────────────────────
        # Serves the Neo4j Browser HTML/JS. The dashboard nav-link now points
        # directly to neo4j:7474 with a ?connectURL=bolt://<host>:7687 param
        # so the browser pre-fills the correct Bolt address instead of
        # defaulting to bolt://localhost:7687 (the user's local machine).
        # This nginx location is kept as a fallback for internal access.
        location /browser/ {
            set $n4j "neo4j:7474";
            proxy_pass         http://$n4j;
            proxy_http_version 1.1;
            proxy_set_header   Upgrade           $http_upgrade;
            proxy_set_header   Connection        $http_connection;
            proxy_set_header   Host              $host;
            proxy_set_header   X-Forwarded-Host  $host;
            proxy_set_header   X-Forwarded-Proto $scheme;
            proxy_set_header   X-Real-IP         $remote_addr;
            proxy_read_timeout 86400;
        }

        # ── Neo4j Bolt WebSocket ──────────────────────────────────────────────
        # Proxies the Bolt binary/WebSocket protocol to neo4j:7687.
        # Used when Neo4j Browser is accessed via the nginx subpath and needs
        # to reach Bolt through the same port (8050).
        location /neo4j-bolt {
            set $bolt "neo4j:7687";
            proxy_pass         http://$bolt;
            proxy_http_version 1.1;
            proxy_set_header   Upgrade    $http_upgrade;
            proxy_set_header   Connection "upgrade";
            proxy_set_header   Host       $host;
            proxy_read_timeout 86400;
        }
    }
}
